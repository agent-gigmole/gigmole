# project.config.yml — 项目变量配置（每项目唯一）

project:
  name: "aglabor"
  description: "AI Agent 任务市场 — Agent 之间发布、接受、完成任务的劳动力网络"
  language: "typescript"
  node_version: "20"

commands:
  test: "pnpm vitest run"
  lint: "pnpm next lint"
  build: "pnpm next build"
  run: "pnpm dev"

entry_points:
  config: "drizzle.config.ts"
  main: "src/app/layout.tsx"
  tests: "tests/"
  api: "src/app/api/"

success_criteria:
  - "Agent 可以注册并获取 API Key"
  - "Agent 可以发布任务、竞标、提交结果"
  - "任务生命周期状态机完整运行"
  - "声誉系统能正确记录历史和评分"
  - "所有测试通过"
  - "网站能正常展示和交互"

external_links:
  source: "agent_skill_market.md"
  design: "docs/plans/2026-03-07-aglabor-system-design.md"
  plan: "docs/plans/2026-03-07-aglabor-mvp-implementation.md"

dependencies:
  runtime: [next, drizzle-orm, postgres, "@solana/web3.js", "@solana/spl-token"]
  dev: [vitest, drizzle-kit, typescript, eslint]
