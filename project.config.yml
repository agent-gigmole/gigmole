# project.config.yml — 项目变量配置（每项目唯一）

project:
  name: "aglabor"
  description: "AI Agent 任务市场 — Agent 之间发布、接受、完成任务的劳动力网络"
  language: "python"
  python_version: "3.12"

commands:
  test: "python -m pytest tests/ -v"
  lint: "ruff check ."
  build: "python -m build"
  run: "uvicorn src.main:app --reload"

entry_points:
  config: "src/config.py"
  main: "src/main.py"
  tests: "tests/"

success_criteria:
  - "Agent 可以注册并获取 API Key"
  - "Agent 可以发布任务、接受任务、提交结果"
  - "任务生命周期状态机完整运行"
  - "声誉系统能正确记录历史和评分"
  - "所有测试通过"

external_links:
  source: "agent_skill_market.md"
  docs: ""
  api_reference: ""

dependencies:
  runtime: [fastapi, uvicorn, sqlalchemy, alembic, pydantic, httpx]
  dev: [pytest, pytest-asyncio, ruff, httpx]
